<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login & Signup - Curacare</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Internal CSS -->
  <style>
    /* Define color variables for consistent theme */
    :root {
      --primary: #E68B67;
      --secondary: #f6ddcb;
      --accent: #0e716a;
      --white: #ffffff;
      --text-dark: #333333;
      --text-light: #666666;
    }

    /* Reset and base styles */
    * {
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }
    

    body {
      background: linear-gradient(135deg, var(--secondary), #fff5ef);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    /* Container for flipping effect */
    .flip-container {
      perspective: 1000px;
      width: 100%;
      max-width: 400px;
      height: 580px;
      position: relative;
    }

    /* Hide the checkbox used for flip toggle */
    input[type="checkbox"]#flip-toggle {
      display: none;
    }

    /* Card holding both login and signup forms */
    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transition: transform 0.8s;
      transform-style: preserve-3d;
    }

    /* Flip the card when checkbox is checked */
    #flip-toggle:checked ~ .card {
      transform: rotateY(180deg);
    }

    /* Common form box styling */
    .form-box {
      background: var(--white);
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      top: 0;
      left: 0;
      display: flex;
      flex-direction: column;
    }

    /* Header styling for both forms */
    .form-header {
      background: linear-gradient(135deg, var(--accent), var(--primary));
      padding: 30px 20px;
      text-align: center;
      position: relative;
    }

    /* Optional background image with transparency */
    .form-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url('Mainlogo3.jpg') center/cover;
      opacity: 0.1;
    }

    .form-header h1,
    .form-header p {
      position: relative;
      z-index: 1;
      color: white;
      margin: 0;
    }

    .form-header p {
      font-size: 0.9rem;
    }

    /* Main body of the form */
    .form-body {
      padding: 30px;
      display: flex;
      flex-direction: column;
      flex: 1;
      justify-content: flex-start;
      overflow-y: auto;
    }

    /* Individual input groups */
    .form-group {
      margin-bottom: 20px;
      position: relative;
    }

    .form-group label {
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 8px;
      display: block;
      color: var(--text-dark);
    }

    .form-group input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e1e1e1;
      border-radius: 10px;
      font-size: 1rem;
      background: #f8f8f8;
    }

    /* Icon inside input */
    .form-group i {
      position: absolute;
      top: 40px;
      right: 15px;
      color: #999;
    }

    .form-group input:focus {
      outline: none;
      background: white;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(14, 113, 106, 0.1);
    }

    /* Remember me and forgot password links */
    .remember-forgot,
    .form-footer {
      font-size: 0.9rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .remember-forgot a {
      color: var(--accent);
      text-decoration: none;
    }

    /* Submit button */
    .btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 10px 0;
      width: 100%;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 15px;
      text-align: center;
      transition: background 0.3s;
      display: block;
    }

    .btn:hover {
      background: var(--primary);
    }

    /* Toggle link to switch forms */
    .signup-toggle {
      text-align: center;
      margin-top: 15px;
    }

    .signup-toggle label {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
    }

    /* Back side of the card (Signup) */
    .signup-box {
      transform: rotateY(180deg);
    }

    /* Social login section */
    .social-login {
      margin-top: 25px;
      text-align: center;
    }

    .social-icons {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 15px;
    }

    .social-icon {
      background: #f8f8f8;
      color: var(--text-light);
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: 0.3s;
    }

    .social-icon:hover {
      background: var(--accent);
      color: white;
      transform: translateY(-3px);
    }

    /* Responsive styles for mobile */
    @media (max-width: 480px) {
      .form-header h1 {
        font-size: 1.5rem;
      }
      .form-body {
        padding: 20px;
      }
    }
  </style>
</head>
<body>

  <!-- Flip container holding the checkbox and card -->
  <div class="flip-container">
    <input type="checkbox" id="flip-toggle" hidden />

    <!-- Card contains both Login and Signup forms -->
    <div class="card">

      <!-- 🔐 Login Form -->
      <div class="form-box login-box">
        <div class="form-header">
          <h1>Welcome Back</h1>
          <p>Please login to your account</p>
        </div>
        <div class="form-body">
          <form action="login.php" method="POST">
            
            <!-- Email input -->
            <div class="form-group">
              <label>Email Address</label>
              <input type="email" name="email" required>
              <i class="fas fa-envelope"></i>
            </div>

            <!-- Password input -->
            <div class="form-group">
              <label>Password</label>
              <input type="password" name="password" required maxlength="8">
              <i class="fas fa-lock"></i>
            </div>

            <!-- Remember me and forgot password -->
            <div class="remember-forgot">
              <label><input type="checkbox" name="remember"> Remember me</label>
              <a href="#">Forgot Password?</a>
            </div>

            <!-- Submit button -->
            <button class="btn" type="submit">Login</button>
          </form>

          <!-- Link to Signup -->
          <div class="signup-toggle">
            Don't have an account?
            <label for="flip-toggle">Sign up</label>
          </div>

          <!-- Social media login options -->
          <div class="social-login">
            <p>Or login with</p>
            <div class="social-icons">
              <a href="#" class="social-icon"><i class="fab fa-google"></i></a>
              <a href="#" class="social-icon"><i class="fab fa-facebook-f"></i></a>
              <a href="#" class="social-icon"><i class="fab fa-twitter"></i></a>
            </div>
          </div>
        </div>
      </div>

      <!-- 📝 Signup Form -->
      <div class="form-box signup-box">
        <div class="form-header">
          <h1>Create Account</h1>
          <p>Join Curacare Health Solutions</p>
        </div>
        <div class="form-body">
          <form action="signup.php" method="POST">
          
            <!-- Full name -->
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" name="full_name" required>
              <i class="fas fa-user"></i>
            </div>

            <!-- Email -->
            <div class="form-group">
              <label>Email Address</label>
              <input type="email" name="email" required>
              <i class="fas fa-envelope"></i>
            </div>

            <!-- Phone -->
            <div class="form-group">
              <label>Phone Number</label>
              <input type="tel" name="phone" required>
              <i class="fas fa-phone"></i>
            </div>

            <!-- Password -->
            <div class="form-group">
              <label>Password</label>
              <input type="password" name="password" required maxlength="8">
              <i class="fas fa-lock"></i>
            </div>

            <!-- Submit -->
            <button class="btn" type="submit">Sign Up</button>
          </form>

          <!-- Link to Login -->
          <div class="signup-toggle">
            Already have an account?
            <label for="flip-toggle">Login</label>
          </div>
        </div>
      </div>

    </div> <!-- End of card -->
  </div> <!-- End of flip-container -->

</body>
</html>
